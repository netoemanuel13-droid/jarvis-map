<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. — Mapa Unificado 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: #00e5ff; }
        #graph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        .hud-top-left { position: fixed; top: 24px; left: 28px; z-index: 100; pointer-events: none; }
        .hud-title { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: 6px; color: #00e5ff; text-shadow: 0 0 12px rgba(0,229,255,0.8); }
        .hud-sub { font-size: 11px; letter-spacing: 2px; color: rgba(0,229,255,0.4); text-transform: uppercase; }
        
        .hud-stats { position: fixed; bottom: 28px; left: 28px; z-index: 100; font-size: 12px; color: rgba(0,229,255,0.4); }
        .stat-value { color: #00e5ff; font-weight: 700; }

        .hud-legend { position: fixed; top: 28px; right: 28px; z-index: 100; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.4); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; opacity: 0.8; }

        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; pointer-events: none; background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%); }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.6.5/dist/three-spritetext.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.70.14/dist/3d-force-graph.min.js"></script>
</head>
<body>
    <div id="graph-container"></div>
    <canvas id="stars-canvas"></canvas>
    <div class="vignette"></div>

    <div class="hud-top-left">
        <div class="hud-title">J.A.R.V.I.S.</div>
        <div class="hud-sub">Mapa Unificado 3D — n8n & Core</div>
    </div>

    <div class="hud-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#00ffff;"></div> CORE</div>
        <div class="legend-item"><div class="legend-dot" style="background:#aa55ff;"></div> AI</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4488ff;"></div> SERVICE</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff6644;"></div> TRIGGER</div>
    </div>

    <div class="hud-stats">NODES: <span class="stat-value" id="node-count">0</span> | V.SYNC: <span class="stat-value">ENABLED</span></div>

    <script>
    // ESTRELAS
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; stars = []; for(let i=0; i<300; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1, a:Math.random()}); }
    resize(); window.addEventListener('resize', resize);
    function draw() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="rgba(0,180,255,0.2)"; stars.forEach(s=>{s.a+=0.01; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*(1+Math.sin(s.a)*0.2),0,Math.PI*2); ctx.fill();}); requestAnimationFrame(draw); }
    draw();

    const COLORS = { core: '#00ffff', ai: '#aa55ff', service: '#4488ff', trigger: '#ff6644', output: '#44ff88' };
    const claudeLogo = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAACXBIWXMAAAsTAAALEwEAmpwYAAAFJUlEQVR4nO3dy2tcVRTH8fOdmSTTNJm0SdumaZukSduYtlIDFRT8YV0IuNClVvArunAnuHHhTnHhwp3gwoU7wYUL/4AuFERR8YdaU6u0SdumaZumaZpm7pt7nIu7mGvS98y99+re7weGlpAsZ3LOvfece4IAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAKAdpM6Z87X6UFXL3vYre5mrfm0vs8/YAnuK3WRL3S87YmXvlE3YfXar3WF/7M2S93v8Y7ZkVvYhT9iS/UAmvE0msyvWk6zYid0z7v3Z56877v7c9+Mec8zL7rInXN/fO8z5vWvM8X+9z5Zf37vMPXUvmP/o73vKnP/3f6/uS9pD5p+7N/Z9zzP5sR+zUtsTeePdzP3mN9f6vYf/sS+79nOfuz+7Nff6f9f3Xf0naS+Zf7n7uZ/vMe+p639N6x9P6hZPmD9uTvW9J+6ve07y3Z9v/+3pX86X/9fW9fD9pX8v7mXvbPfdl/S9qD9vP77unfv+f7z38n7Wf3rO/7Y9X37+m6Wv78/unf36l60P76/uq+P3F9/+69Vv78/ulft8v60P30XuvvdfUfPHeqHvT+uj/V9/dfP9fXl/mX++v73vif6v/p7+7pA9C+9v2D9vUvI9N/rPvv+r6v8uP7u96+T60f9mZun7Unf9+S9pO/Z31vyfIH7cnf996xvP28P9pX/px79vf7Uf9Of07/f/05/fn9/6Y/f//+9P/nz+/v35//v79/f/mD9vTvX9K+f3//9M/7v9eP6v8P2p8/Pz9/f/78/f3nP9f3l/mXPz8/f3/+/P3nD9rXv4xM/7Huv9OPrP9OPrL+O/3I+u/0I+u/04+s/04/sv47/cj67/Qj67/Tj6z/Tj+y/jv9yPrv9CPrv9OPrP9OPrL+O/3I+u/0I+u/04+s/04/sv47/cj67/Qj67/Tj6z/Tj+y/jv9yPrv9OPrP9OPrL+O/3I+u/0I+u/04+s/04/sh/17/Tv9PfbP7X/Tz9y/+f0I+fP6f83/V9ZfwC03/u/XN8/9edO/3P+D9L/1f6P7P+u/v8D9f+j/n8B9f9D/T8P+l8e9L886H950P/yoP/lQf/Lg/6XB/0vD/pfHvS/POh/edD/8qD/5UH/y4P+lwf9Lw/6Xx70vzzof3nQ//Kg/+VB/8uD/pcH/S8P+l8e9L886H950P/yoP/lQf/Lg/6XB/0vD/pfHvS/POh/edD/8qD/5UH/y4P+lwf9Lw/6Xx70vzzof3nQ//Kg/+VB/8uD/pcH/S8P+l8e9L886H950P/yoP/lQf/LR/aZ/Wj/rB7ZrvZPy96u9U/TPvV/fG2vlL1S65+qfVLpX6f1S9L+6G+e9vXvV9K+79/6XlX9U7Wf9vWnf/vekt+f/u37S35/UvVP++r6q/qX1f+3vdfS97e979b908YAtJ/9d/p77Xv32vfulf699r17fW9f9+/rv9e+p79Nf5v+Nn279LeP7e3v8T6x9P0AAAAAAAAAAAAAAAD+A6sRov7jGf6tAAAAAElFTkSuQmCC';

    const graphData = {
        nodes: [
            { id: 'core', name: 'J.A.R.V.I.S. CORE', group: 'core', val: 55 },
            { id: 'claude_code', name: 'CLAUDE CODE', group: 'ai', val: 32 },
            { id: 'claude_sonnet', name: 'CLAUDE SONNET', group: 'ai', val: 28 },
            { id: 'master', name: 'JARVIS MASTER', group: 'ai', val: 30 },
            { id: 'n8n', name: 'n8n ENGINE', group: 'service', val: 30 },
            { id: 'meta', name: 'META ADS AGENT', group: 'ai', val: 18 },
            { id: 'ebook', name: 'E-BOOK GEN', group: 'ai', val: 18 },
            { id: 'insta', name: 'INSTA QA AGENT', group: 'ai', val: 18 },
            { id: 'omni', name: 'OMNICHAT ELITE', group: 'service', val: 18 },
            { id: 'health', name: 'HEALTH MONITOR', group: 'service', val: 18 },
            { id: 'bridge', name: 'PYTHON BRIDGE', group: 'service', val: 20 },
            { id: 'docker', name: 'DOCKER CONTAINER', group: 'service', val: 20 },
            { id: 'guardian', name: 'GUARDIAN', group: 'service', val: 18 },
            { id: 'webhook', name: 'WEBHOOK', group: 'trigger', val: 16 },
            { id: 'schedule', name: 'SCHEDULE TRIGGER', group: 'trigger', val: 16 },
            { id: 'file', name: 'FILE SYSTEM', group: 'output', val: 15 },
            { id: 'tg_bot', name: 'TELEGRAM BOT', group: 'output', val: 18 }
        ],
        links: [
            { source: 'core', target: 'claude_code' }, { source: 'core', target: 'claude_sonnet' }, { source: 'core', target: 'master' },
            { source: 'core', target: 'n8n' }, { source: 'core', target: 'bridge' }, { source: 'core', target: 'docker' },
            { source: 'core', target: 'guardian' }, { source: 'n8n', target: 'meta' }, { source: 'n8n', target: 'ebook' },
            { source: 'n8n', target: 'insta' }, { source: 'n8n', target: 'omni' }, { source: 'n8n', target: 'health' },
            { source: 'n8n', target: 'webhook' }, { source: 'n8n', target: 'schedule' }, { source: 'claude_code', target: 'file' },
            { source: 'claude_code', target: 'docker' }, { source: 'master', target: 'tg_bot' }, { source: 'bridge', target: 'n8n' }
        ]
    };

    document.getElementById('node-count').textContent = graphData.nodes.length;

    const Graph = ForceGraph3D()(document.getElementById('graph-container'))
        .graphData(graphData)
        .backgroundColor('#000000')
        .showNavInfo(false)
        .nodeColor(n => COLORS[n.group])
        .linkColor(() => 'rgba(0,229,255,0.4)')
        .linkDirectionalParticles(3)
        .linkDirectionalParticleSpeed(0.005)
        .nodeThreeObject(node => {
            const group = new THREE.Group();
            if (node.id.includes('claude')) {
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.TextureLoader().load(claudeLogo), color: COLORS.ai }));
                sprite.scale.set(25, 25, 1); group.add(sprite);
            } else {
                group.add(new THREE.Mesh(new THREE.SphereGeometry(node.val/4.5), new THREE.MeshLambertMaterial({ color: COLORS[node.group], transparent: true, opacity: 0.85 })));
            }
            const label = new SpriteText(node.name); 
            label.color = COLORS[node.group]; 
            label.textHeight = 7; 
            label.position.y = -15; 
            label.backgroundColor = 'rgba(0,10,20,0.85)'; 
            label.padding = 3; 
            label.borderRadius = 4;
            label.fontWeight = 'bold';
            group.add(label); return group;
        })
        .onNodeClick(node => {
            isRotating = false; // Pausa a rotação para focar no agente
            const distance = 80;
            const distRatio = 1 + distance/Math.hypot(node.x || 1, node.y || 1, node.z || 1);
            Graph.cameraPosition(
                { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
                node, // LookAt
                2000  // Duração da transição em ms
            );
        })
        .onBackgroundClick(() => {
            isRotating = true; // Retoma rotação ao clicar no vácuo
        });

    Graph.d3Force('charge').strength(-550);
    Graph.d3Force('link').distance(150);

    let angle = 0;
    let isRotating = true;
    (function rotate() { 
        if (isRotating) {
            angle += 0.0015; 
            Graph.cameraPosition({ x: 450 * Math.sin(angle), z: 450 * Math.cos(angle), y: 150 * Math.cos(angle) }); 
        }
        requestAnimationFrame(rotate); 
    })();
    </script>
</body>
</html>
